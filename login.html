<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - FPMSB Lurah Bilut</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/image/favicon.ico">
    <link rel="shortcut icon" href="/image/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/image/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/image/favicon-16x16.png">
    <link rel="manifest" href="/image/site.webmanifest">
    <meta name="theme-color" content="#2d6a4f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FPMSB Lurah Bilut">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { max-width: 420px; width: 90%; background: white; border-radius: 28px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); padding: 40px 32px; text-align: center; border: 1px solid #e2e8f0; position: relative; }
        .logo-area { margin-bottom: 30px; }
        .logo-icon { width: 70px; height: 70px; background: #2d6a4f; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .logo-icon i { font-size: 2rem; color: white; }
        h2 { color: #0f172a; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 0.95rem; transition: all 0.2s; background: #f8fafc; }
        .input-group input:focus { outline: none; border-color: #2d6a4f; background: white; box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
        .btn-login { width: 100%; padding: 14px; background: #2d6a4f; color: white; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-login:hover { background: #1b4d3e; transform: translateY(-2px); }
        .btn-back { width: 100%; padding: 12px; background: transparent; color: #64748b; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 12px; }
        .btn-back:hover { background: #f1f5f9; color: #2d6a4f; border-color: #2d6a4f; }
        .error-msg { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 14px; font-size: 0.8rem; margin-bottom: 20px; display: none; }
        .info-text { font-size: 0.7rem; color: #94a3b8; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
        @media (max-width: 480px) { .login-container { padding: 30px 24px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-tractor"></i></div>
            <h2>FPMSB Lurah Bilut</h2>
            <div class="subtitle">Dashboard Operasi Ladang</div>
        </div>
        
        <div class="error-msg" id="errorMsg">✗ Kredensial tidak sah. Cuba lagi.</div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> EMAIL</label>
            <input type="email" id="email" placeholder="admin@fpmsb.com" value="admin@fpmsb.com">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> KATA LALUAN</label>
            <input type="password" id="password" placeholder="••••••" value="admin123">
        </div>
        
        <button class="btn-login" onclick="login()"><i class="fas fa-arrow-right-to-bracket"></i> Log Masuk</button>
        
        <button class="btn-back" onclick="goToHome()"><i class="fas fa-home"></i> Kembali ke Laman Utama</button>
        
        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Akses terhad untuk pentadbir sahaja
        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            if (email === 'admin@fpmsb.com' && password === 'admin123') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                window.location.href = 'admin/upload.html';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        }
        
        function goToHome() {
            window.location.href = 'index.html';
        }
        
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'admin/upload.html';
        }
    </script>
</body>
</html>
