            <div class="card"><h3><i class="fas fa-users"></i> Pengurusan Ladang</h3><div class="org-chart"><div class="org-level"><div class="org-card fc-card"><div class="org-role"><i class="fas fa-crown"></i> FIELD CONTROLLER</div><div class="org-name">ZULZAMHURI BIN MOHAMAD NOOR</div></div></div><div class="connector-line"></div><div class="org-level"><div class="org-card"><div class="org-role"><i class="fas fa-user-tie"></i> AFC 1</div><div class="org-name">Mohd Helme bin Ismail</div></div><div class="org-card"><div class="org-role"><i class="fas fa-user-tie"></i> AFC 2</div><div class="org-name">Mohd Fekre Bin Rahman</div></div></div><div class="connector-line"></div><div class="org-level"><div class="org-card"><div class="org-role"><i class="fas fa-file-alt"></i> KERANI 1</div><div class="org-name">Nurul Famiza binti Aminudin</div></div><div class="org-card"><div class="org-role"><i class="fas fa-file-alt"></i> KERANI 2</div><div class="org-name">Nur Aina Shafiqah binti Mohd Zamani</div></div></div><div style="margin:8px 0 12px;"><i class="fas fa-arrow-down" style="color: var(--primary);"></i></div><div class="fs-group"><div class="fs-box"><div class="fs-title" style="font-weight:800; margin-bottom:12px;"><i class="fas fa-hand-holding-heart"></i> FS HARVESTING</div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Harvesting 1</div><div class="org-name">Ahmad Amirul bin Khalid</div></div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Harvesting 2</div><div class="org-name">Mohd Raof bin Mohd Ibrahim</div></div><div class="org-card"><div class="org-role">FS Harvesting 3</div><div class="org-name">Hafizul fikri</div></div></div><div class="fs-box"><div class="fs-title" style="font-weight:800; margin-bottom:12px;"><i class="fas fa-seedling"></i> FS UPKEEP</div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Upkeep 1</div><div class="org-name">Nik Azman Bin Nik Wan</div></div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Upkeep 2</div><div class="org-name">Muhammad Hairul Bin Jamaluddin</div></div><div class="org-card"><div class="org-role">FS Upkeep 3</div><div class="org-name">Muhammad Izzul Muhaimin bin Edy</div></div></div></div></div></div>
            <div class="card"><h3><i class="fas fa-chalkboard-user"></i> Kedudukan Tenaga Kerja</h3><div class="stats-row"><div class="stat-card"><div class="stat-number">7</div><div>👨‍🌾 MANDOR</div></div><div class="stat-card"><div class="stat-number">73</div><div>🌴 PENUAI</div></div><div class="stat-card"><div class="stat-number">7</div><div>🧪 PEMBAJAAN</div></div><div class="stat-card"><div class="stat-number">16</div><div>✂️ MERUMPUT</div></div></div></div>
        `},
        hasil: { title: "📈 Laporan Hasil Ladang", subtitle: "Pencapaian mengikut Peringkat · Target vs Capai (hingga Mac 2026)", content: `
            <div class="card"><div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><h3><i class="fas fa-chart-bar"></i> Prestasi Hasil per Peringkat (Tan/Ha)</h3><span class="badge">Klik pada bar untuk detail</span></div><div class="chart-container"><canvas id="hasilChart" style="width:100%; height:500px;"></canvas></div></div>
            <div class="card"><h3><i class="fas fa-table"></i> Ringkasan Pencapaian Mengikut Peringkat</h3><div style="overflow-x:auto;"><table class="summary-table" id="summaryTable"><thead><tr><th>Peringkat</th><th>Luas (Ha)</th><th>Target Tahunan (T/Ha)</th><th>Pencapaian Semasa (T/Ha)</th><th>% Capai Target</th></tr></thead><tbody id="summaryTableBody"></tbody></table></div></div>
        `},
        mekanisasi: { title: "🚜 Laporan Mekanisasi", subtitle: "Penggunaan jentera & peralatan ladang", content: `<div class="card"><div class="placeholder"><i class="fas fa-tractor"></i><h3>Data Mekanisasi Akan Dikemaskini</h3><p>Maklumat penggunaan jentera, kos operasi, dan jadual penyelenggaraan akan dipaparkan di sini.</p></div></div>` },
        pembajaan: { title: "🧪 Laporan Pembajaan", subtitle: "Penggunaan baja & jadual pembajaan ladang", content: `<div class="card"><div class="placeholder"><i class="fas fa-seedling"></i><h3>Data Pembajaan Akan Dikemaskini</h3><p>Maklumat jenis baja, kuantiti, jadual aplikasi, dan kos pembajaan akan dipaparkan di sini.</p></div></div>` },
        merumput: { title: "✂️ Laporan Merumput", subtitle: "Aktiviti kawalan rumpai & pembersihan ladang", content: `<div class="card"><div class="placeholder"><i class="fas fa-cut"></i><h3>Data Merumput Akan Dikemaskini</h3><p>Maklumat kawasan dirumput, kaedah, tenaga kerja, dan jadual kerja akan dipaparkan di sini.</p></div></div>` },
        bap: { title: "🍃 Best Agriculture Practice (BAP)", subtitle: "Amalan Pertanian Terbaik & Pematuhan Standard", content: `<div class="card"><h3><i class="fas fa-check-circle"></i> Prinsip BAP</h3><div class="bap-grid"><div class="bap-card"><i class="fas fa-leaf"></i><h4>Pengurusan Tanaman</h4><p>Amalan agronomi terbaik untuk produktiviti optimum</p></div><div class="bap-card"><i class="fas fa-tint"></i><h4>Pengurusan Air</h4><p>Sistem saliran & pengairan yang efisien</p></div><div class="bap-card"><i class="fas fa-flask"></i><h4>Pengurusan Baja</h4><p>Penggunaan baja mengikut keperluan tanah & pokok</p></div><div class="bap-card"><i class="fas fa-bug"></i><h4>Kawalan Perosak</h4><p>Integrated Pest Management (IPM)</p></div><div class="bap-card"><i class="fas fa-chalkboard-user"></i><h4>Keselamatan Pekerja</h4><p>Latihan & PPE untuk keselamatan operasi</p></div><div class="bap-card"><i class="fas fa-chart-line"></i><h4>Rekod & Dokumentasi</h4><p>Perekodan aktiviti ladang yang sistematik</p></div></div></div><div class="card"><div class="placeholder"><i class="fas fa-chart-simple"></i><h3>Data Pematuhan BAP Akan Dikemaskini</h3><p>Maklumat audit, pensijilan, dan indikator pematuhan akan dipaparkan di sini.</p></div></div>` }
    };

    function renderSummaryTable() {
        const tbody = document.getElementById('summaryTableBody');
        if(!tbody) return;
        tbody.innerHTML = '';
        peringkatList.forEach(p => {
            const percent = ((p.currentTHa / p.targetYearTHa) * 100).toFixed(1);
            tbody.innerHTML += `<tr style="cursor:pointer" onclick="showDetailModalByCode('${p.id}')"><td><strong>${p.name}</strong></td><td>${p.luas.toFixed(2)}</td><td>${p.targetYearTHa.toFixed(2)} T/Ha</td><td>${p.currentTHa.toFixed(2)} T/Ha</td><td style="color:${percent>=20?'#2c6e2f':'#d4a13e'}; font-weight:600;">${percent}%</td></tr>`;
        });
    }

    function initChart() {
        const canvas = document.getElementById('hasilChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const labels = peringkatList.map(p => p.name);
        const currentData = peringkatList.map(p => p.currentTHa);
        const targetData = peringkatList.map(p => p.targetYearTHa);
        if(yieldChart) yieldChart.destroy();
        yieldChart = new Chart(ctx, {
            type: 'bar', data: { labels, datasets: [{ label: 'Target Tahunan (T/Ha)', data: targetData, backgroundColor: '#e8f0e8', borderColor: '#d4a13e', borderWidth: 2, borderDash: [6,6], borderRadius: 6, barPercentage: 0.65, datalabels: { display: true, anchor: 'end', align: 'top', color: '#d4a13e', font: { size: 11, weight: 'bold' }, formatter: v => v.toFixed(1) + ' T/Ha' } }, { label: 'Hasil Semasa (T/Ha) - Mac 2026', data: currentData, backgroundColor: '#2c6e2f', borderRadius: 6, barPercentage: 0.65, datalabels: { display: true, anchor: 'end', align: 'top', color: '#1e4a1f', font: { size: 12, weight: 'bold' }, formatter: v => v.toFixed(2) + ' T/Ha' } }] },
            options: { responsive: true, maintainAspectRatio: true, layout: { padding: { top: 45, bottom: 10 } }, plugins: { tooltip: { mode: 'index', callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(2)} T/Ha` } }, legend: { position: 'top', labels: { font: { size: 12 } } }, datalabels: { display: true } }, scales: { y: { title: { display: true, text: 'Tan/Ha', font: { size: 13, weight: 'bold' } }, beginAtZero: true, max: Math.max(...targetData, ...currentData) * 1.2, ticks: { callback: (v) => v.toFixed(1) + ' T/Ha' } }, x: { title: { display: true, text: 'Peringkat', font: { size: 13, weight: 'bold' } }, ticks: { maxRotation: 45, minRotation: 45, font: { size: 11 } } } }, onClick: (e, active) => { if(active.length) showDetailModal(peringkatList[active[0].index]); } }
        });
    }

    window.showDetailModalByCode = function(code) { showDetailModal(peringkatList.find(p => p.id === code)); };
    
    function showDetailModal(p) {
        if(!p) return;
        const modal = document.getElementById('detailModal'), modalTitle = document.getElementById('modalTitle'), modalBody = document.getElementById('modalBody');
        modalTitle.innerText = `Peringkat ${p.name} - Analisis Terperinci`;
        const months = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
        const activeMonths = months.slice(0,3);
        let tableRows = "", total2025 = 0, total2026 = 0;
        for(let i=0; i<3; i++) {
            let v25 = p.monthlyTHa2025[i], v26 = p.monthlyTHa2026[i];
            if(v25 !== null && v25 !== undefined) total2025 += v25;
            total2026 += v26;
            let diff = (v25 && v25>0) ? ((v26 - v25)/v25*100).toFixed(1) : (v26>0?'Baru':'-');
            tableRows += `<tr><td><strong>${activeMonths[i]}</strong></td><td>${v25!==null? v25.toFixed(2):'-'} T/Ha</td><td>${v26.toFixed(2)} T/Ha</td><td style="color:${diff!=='-' && parseFloat(diff)>=0?'green':'red'}">${diff}</td></tr>`;
        }
        const sum2025 = total2025.toFixed(2), sum2026 = total2026.toFixed(2);
        const totalDiff = (total2025>0) ? ((total2026 - total2025)/total2025*100).toFixed(1) : (total2026>0?100:0);
        
        modalBody.innerHTML = `
            <div class="detail-stats">
                <div class="stat-box"><div class="stat-label">Luas (Ha)</div><div class="stat-value">${p.luas.toFixed(2)}</div></div>
                <div class="stat-box"><div class="stat-label">Target Tahunan (T/Ha)</div><div class="stat-value">${p.targetYearTHa.toFixed(2)}</div></div>
                <div class="stat-box"><div class="stat-label">Target hingga Mac (T/Ha)</div><div class="stat-value">${p.targetToMac.toFixed(2)}</div></div>
                <div class="stat-box"><div class="stat-label">Capai hingga Mac (T/Ha)</div><div class="stat-value">${p.currentTHa.toFixed(2)}</div></div>
                <div class="stat-box"><div class="stat-label">% Capai</div><div class="stat-value">${((p.currentTHa/p.targetToMac)*100).toFixed(1)}%</div></div>
            </div>
            <h4>📈 Trend Tandan/Pokok/Bulan (Jan - Dis 2026)</h4>
            <div class="mini-chart"><canvas id="trendTandanChart" style="width:100%; height:260px;"></canvas></div>
            <h4>⚖️ Purata Berat Tandan (kg) - Bulanan</h4>
            <div class="mini-chart"><canvas id="trendBeratChart" style="width:100%; height:260px;"></canvas></div>
            <h4>📊 Perbandingan Hasil Bulanan (T/Ha) - 2025 vs 2026</h4>
            <div class="mini-chart"><canvas id="comparisonChart" style="width:100%; height:260px;"></canvas></div>
            <div style="overflow-x:auto;">
                <table style="width:100%"><thead><tr><th>Bulan</th><th>2025 (T/Ha)</th><th>2026 (T/Ha)</th><th>Beza</th></tr></thead><tbody>${tableRows}</tbody>
                <tfoot><tr style="background:#f1f5f9; font-weight:600;"><td>JUMLAH (Jan-Mac)</td><td>${sum2025} T/Ha</td><td>${sum2026} T/Ha</td><td style="color:${totalDiff>=0?'green':'red'}">${totalDiff}%</td></tr></tfoot></table>
            </div>
            <h4 style="margin-top:28px;">📋 Analisa Ringkas</h4>
            <div style="background:#f8f9fc; padding:18px; border-radius:16px; margin-top:10px;">
                <p style="line-height:1.6;">Pencapaian ${((p.currentTHa/p.targetToMac)*100).toFixed(1)}% dari target hingga Mac (${p.targetToMac.toFixed(2)} T/Ha). ${totalDiff>=0?'Berbanding tempoh sama 2025, hasil meningkat '+totalDiff+'%':'Berbanding tempoh sama 2025, hasil menurun '+Math.abs(totalDiff)+'%'}.</p>
            </div>
            <div class="subnote" style="margin-top:16px; font-size:0.7rem; color:gray;">*Data Jan–Mac 2026. Target hingga Mac berdasarkan pro-rata target tahunan (3 bulan). Bulan April–Disember 2026 akan dikemas kini selepas bulan berjalan.</div>
        `;
        modal.style.display = "flex";
        setTimeout(() => {
            const ctxT = document.getElementById('trendTandanChart');
            const ctxB = document.getElementById('trendBeratChart');
            const ctxC = document.getElementById('comparisonChart');
            if(ctxT) new Chart(ctxT, { type:'line', data:{ labels:months, datasets:[{ label:'Tandan/Pokok/Bulan', data:p.tandanPerPkkData, borderColor:'#2c6e2f', backgroundColor:'rgba(44,110,47,0.1)', fill:true, tension:0.3, pointRadius:5, pointBackgroundColor:'#2c6e2f' }] }, options:{ responsive:true, maintainAspectRatio:true, plugins:{ tooltip:{ callbacks:{ label:(ctx)=>ctx.raw?`${ctx.raw.toFixed(2)} tandan/pokok`:'Tiada data' } } }, scales:{ y:{ title:{ display:true, text:'Tandan/Pokok' }, beginAtZero:true } } } });
            if(ctxB) new Chart(ctxB, { type:'bar', data:{ labels:months, datasets:[{ label:'Purata Berat Tandan (kg)', data:p.beratTandanByMonth, backgroundColor:'#d4a13e', borderRadius:6, datalabels:{ display:true, align:'top', anchor:'end', color:'#d4a13e', font:{ size:10, weight:'bold' }, formatter:(v)=>v?`${v.toFixed(1)} kg`:'' } }] }, options:{ responsive:true, maintainAspectRatio:true, plugins:{ tooltip:{ callbacks:{ label:(ctx)=>ctx.raw?`${ctx.raw.toFixed(1)} kg/tandan`:'Tiada data' } } }, scales:{ y:{ title:{ display:true, text:'Berat (kg)' }, beginAtZero:true } } } });
            if(ctxC) new Chart(ctxC, { type:'bar', data:{ labels:months, datasets:[{ label:'2025', data:p.monthlyTHa2025, backgroundColor:'#9aa9b9', borderRadius:6 },{ label:'2026', data:p.monthlyTHa2026, backgroundColor:'#2c6e2f', borderRadius:6 }] }, options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ position:'top' } }, scales:{ y:{ title:{ display:true, text:'Tan/Ha' }, beginAtZero:true } } } });
        }, 100);
    }

    function loadPage(pageId) {
        const page = pagesData[pageId];
        if(!page) return;
        document.getElementById('pageContent').innerHTML = `<div class="page-title"><h1>${page.title}</h1><p>${page.subtitle}</p></div>${page.content}`;
        document.querySelectorAll('.nav-links a').forEach(link => { link.classList.remove('active'); if(link.getAttribute('data-page') === pageId) link.classList.add('active'); });
        history.pushState({ page: pageId }, '', `?page=${pageId}`);
        if(pageId === 'hasil') { renderSummaryTable(); setTimeout(() => initChart(), 50); }
    }

    // Auto-hide untuk mobile & desktop - toggle button sentiasa kelihatan
    function initSidebarToggle() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        
        // Set initial state - sidebar terbuka
        sidebar.classList.remove('collapsed');
        mainContent.classList.remove('expanded');
        toggleBtn.classList.remove('shifted');
        
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            toggleBtn.classList.toggle('shifted');
        });
    }

    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', (e) => { e.preventDefault(); loadPage(link.getAttribute('data-page')); });
    });

    const modal = document.getElementById('detailModal'), closeModal = document.getElementById('closeModalBtn');
    closeModal.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if(e.target === modal) modal.style.display = "none"; };
    window.addEventListener('popstate', (e) => { const urlParams = new URLSearchParams(window.location.search); loadPage(urlParams.get('page') || 'info'); });
    
    // Handle resize untuk chart
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if(yieldChart) { yieldChart.resize(); yieldChart.update(); }
        }, 250);
    });
    
    initSidebarToggle();
    const urlParams = new URLSearchParams(window.location.search);
    loadPage(urlParams.get('page') || 'info');
</script>
</body>
