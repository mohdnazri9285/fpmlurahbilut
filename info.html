<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FPMSB Lurah Bilut - Dashboard Ladang Interaktif</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/image/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/image/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/image/favicon/favicon-16x16.png">
    <link rel="manifest" href="/image/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/image/favicon/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #eef5ea 0%, #dde8da 100%);
            color: #1a3a2e;
            overflow-x: hidden;
        }

        :root {
            --primary: #2d6a4f;
            --primary-dark: #1b4d3e;
            --primary-light: #a7e0c0;
            --primary-soft: #d8f3dc;
            --secondary: #f4a261;
            --secondary-dark: #e76f51;
            --accent: #ffb703;
            --dark: #2b2d42;
            --gray-bg: #fefae0;
            --gray-border: #e9edc9;
            --text-dark: #2c3e2f;
            --text-muted: #5a6e5a;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            --shadow-glow: 0 0 15px rgba(45, 106, 79, 0.3);
            --transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #d4e2d0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* SIDEBAR - AUTO HIDE */
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(45, 106, 79, 0.94);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
            transform: translateX(0);
        }

        /* Sidebar auto-hide: bila collapsed, ia keluar dari skrin */
        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* Toggle button - sentiasa nampak */
        .toggle-sidebar {
            position: fixed;
            left: 290px;
            top: 24px;
            background: white;
            border: none;
            border-radius: 50px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 102;
            box-shadow: var(--shadow-md);
            transition: all 0.3s;
            color: var(--primary);
            font-size: 1.3rem;
            background: #ffffffdd;
            backdrop-filter: blur(8px);
        }

        /* Bila sidebar collapsed, toggle button bergerak ke tepi kiri */
        .toggle-sidebar.shifted {
            left: 24px;
        }

        .toggle-sidebar:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05) rotate(90deg);
            box-shadow: var(--shadow-glow);
        }

        /* Sidebar styling */
        .sidebar-header {
            padding: 32px 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }
        .sidebar-header h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }
        .sidebar-header p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 6px;
        }
        .nav-links {
            list-style: none;
            padding: 0 16px;
        }
        .nav-links li {
            margin-bottom: 8px;
        }
        .nav-links a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
            cursor: pointer;
        }
        .nav-links a i {
            width: 24px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.85);
        }
        .nav-links a.active {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }
        .nav-links a:hover:not(.active) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(6px);
        }

        /* MAIN CONTENT STYLING */
        .container {
            padding: 28px 36px;
        }
        .page-title {
            margin-bottom: 32px;
            margin-top: 8px;
            animation: fadeInUp 0.6s ease;
        }
        .page-title h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .page-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 8px;
        }

        /* CARD GLASSMORPHISM */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            box-shadow: var(--shadow-md);
            padding: 26px 30px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: var(--transition);
            animation: fadeInUp 0.5s ease backwards;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            background: rgba(255, 255, 255, 0.95);
            border-color: var(--primary-light);
        }
        .card h3 {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid var(--secondary);
            padding-left: 18px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }
        .info-item {
            background: white;
            border-radius: 24px;
            padding: 18px 22px;
            transition: var(--transition);
            border: 1px solid var(--gray-border);
            box-shadow: var(--shadow-sm);
        }
        .info-item:hover {
            border-color: var(--primary);
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }
        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--secondary-dark);
            margin-bottom: 8px;
            font-weight: 700;
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }
        .vision-mission {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 12px;
        }
        .vm-card {
            background: linear-gradient(145deg, #ffffff, var(--primary-soft));
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            transition: var(--transition);
            cursor: pointer;
        }
        .vm-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            background: white;
        }
        .vm-card i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 16px;
            transition: var(--transition);
        }
        .values-list {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 10px;
        }
        .value-badge {
            background: linear-gradient(120deg, var(--primary-soft), #c8e6d9);
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-dark);
            transition: var(--transition);
            cursor: pointer;
        }
        .org-chart { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .org-level { display: flex; justify-content: center; flex-wrap: wrap; gap: 24px; }
        .org-card {
            background: white;
            border-radius: 24px;
            padding: 18px 28px;
            min-width: 210px;
            text-align: center;
            box-shadow: var(--shadow-md);
            transition: var(--transition);
            border: 1px solid var(--gray-border);
        }
        .fc-card { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .fc-card .org-role, .fc-card .org-name { color: white; }
        .org-role { font-weight: 800; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .connector-line { width: 2px; height: 24px; background: linear-gradient(to bottom, var(--primary), var(--secondary)); margin: 4px auto; }
        .fs-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; width: 100%; margin-top: 16px; }
        .fs-box { background: rgba(255, 248, 225, 0.9); border-radius: 28px; padding: 18px 24px; min-width: 250px; backdrop-filter: blur(4px); }
        .stats-row { display: flex; flex-wrap: wrap; gap: 24px; justify-content: space-around; }
        .stat-card { text-align: center; padding: 24px 28px; background: white; border-radius: 32px; min-width: 140px; transition: var(--transition); cursor: pointer; border: 1px solid var(--gray-border); }
        .stat-card:hover { transform: scale(1.05); background: var(--primary-soft); }
        .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        footer { text-align: center; font-size: 0.7rem; padding: 24px; color: #7a8e7a; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 20px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .container { padding: 16px; } .vision-mission { grid-template-columns: 1fr; } .org-card { min-width: 160px; } }
    </style>
</head>
<body>
<div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>🌿 FPMSB<br>Lurah Bilut</h3>
            <p>Dashboard Operasi Interaktif</p>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a data-page="info" class="active"><i class="fas fa-tachometer-alt"></i> Info Ladang</a></li>
            <li><a data-page="hasil"><i class="fas fa-chart-line"></i> Hasil</a></li>
            <li><a data-page="mekanisasi"><i class="fas fa-tractor"></i> Mekanisasi</a></li>
            <li><a data-page="pembajaan"><i class="fas fa-seedling"></i> Pembajaan</a></li>
            <li><a data-page="merumput"><i class="fas fa-cut"></i> Merumput</a></li>
            <li><a data-page="bap"><i class="fas fa-leaf"></i> BAP</a></li>
        </ul>
    </div>

    <!-- TOGGLE BUTTON -->
    <div class="toggle-sidebar" id="toggleSidebarBtn"><i class="fas fa-bars"></i></div>

    <!-- MAIN CONTENT (dynamic) -->
    <div class="main-content" id="mainContent">
        <div class="container" id="pageContent">
            <!-- Content akan diisi oleh JavaScript -->
        </div>
        <footer>© 2025 FPMSB Lurah Bilut — Dashboard Ladang Interaktif | Data Operasi Sawit Terkini</footer>
    </div>
</div>

<script>
    // ======================= DATA UNTUK SEMUA HALAMAN =======================
    const pagesData = {
        info: {
            title: "🌾 Info Ladang L. Bilut",
            subtitle: "Maklumat Asas Rancangan FELDA Lurah Bilut — Dashboard Dinamik & Interaktif",
            content: `
                <div class="card">
                    <h3><i class="fas fa-landmark"></i> Sejarah & Latar Belakang</h3>
                    <div class="info-grid">
                        <div class="info-item"><div class="info-label">Nama Rancangan</div><div class="info-value">🏷️ FELDA Lurah Bilut</div></div>
                        <div class="info-item"><div class="info-label">Lokasi</div><div class="info-value">📍 Bentong, Pahang</div></div>
                        <div class="info-item"><div class="info-label">Tahun Dibuka</div><div class="info-value">📅 1958</div></div>
                        <div class="info-item"><div class="info-label">Status</div><div class="info-value">🏆 Rancangan Pembangunan Tanah Berkelompok Pertama Malaysia & Dunia</div></div>
                    </div>
                    <div style="margin-top:20px; padding:20px; background: linear-gradient(120deg, var(--primary-soft), white); border-radius: 24px; border-left: 4px solid var(--secondary);">
                        <p>🌱 <strong>Lurah Bilut</strong> ialah sebuah kawasan penempatan FELDA yang terletak di Bentong, Pahang. Ia mula dibuka pada tahun 1958 dan merupakan rancangan pembangunan tanah secara berkelompok untuk pertanian yang pertama ditubuhkan seumpamanya di Malaysia dan dunia.</p>
                    </div>
                </div>
                <div class="card"><h3><i class="fas fa-bullseye"></i> Visi & Misi</h3><div class="vision-mission"><div class="vm-card"><i class="fas fa-eye"></i><h4>Visi</h4><p>Menjadi pemacu dalam pembangunan progresif penempatan negara</p></div><div class="vm-card"><i class="fas fa-flag-checkered"></i><h4>Misi</h4><p>Menambah nilai kepada kepentingan peneroka & kelestarian ladang</p></div></div></div>
                <div class="card"><h3><i class="fas fa-chart-line"></i> Tunjang Strategik & Nilai FELDA</h3><ul style="list-style:none; margin-bottom:24px;"><li style="padding:10px 0; display:flex; gap:12px;"><i class="fas fa-chart-simple" style="color:var(--primary);"></i> Mengungguli kecekapan operasi dan keberkesanan kos</li><li style="padding:10px 0; display:flex; gap:12px;"><i class="fas fa-medal" style="color:var(--primary);"></i> Menjadi pilihan utama dalam pengurusan ladang</li></ul><div class="values-list"><span class="value-badge">💰 Financial Sustainability</span><span class="value-badge">📊 Efficient & Cost Control</span><span class="value-badge">🔄 Legacy Reformation</span><span class="value-badge">💻 Digitalization People & Governance</span><span class="value-badge">🤝 Advanced Cooperative</span></div></div>
                <div class="card"><h3><i class="fas fa-users"></i> Pengurusan Ladang</h3><div class="org-chart"><div class="org-level"><div class="org-card fc-card"><div class="org-role"><i class="fas fa-crown"></i> FIELD CONTROLLER</div><div class="org-name">ZULZAMHURI BIN MOHAMAD NOOR</div></div></div><div class="connector-line"></div><div class="org-level"><div class="org-card"><div class="org-role"><i class="fas fa-user-tie"></i> AFC 1</div><div class="org-name">Mohd Helme bin Ismail</div></div><div class="org-card"><div class="org-role"><i class="fas fa-user-tie"></i> AFC 2</div><div class="org-name">Mohd Fekre Bin Rahman</div></div></div><div class="connector-line"></div><div class="org-level"><div class="org-card"><div class="org-role"><i class="fas fa-file-alt"></i> KERANI 1</div><div class="org-name">Nurul Famiza binti Aminudin</div></div><div class="org-card"><div class="org-role"><i class="fas fa-file-alt"></i> KERANI 2</div><div class="org-name">Nur Aina Shafiqah binti Mohd Zamani</div></div></div><div style="margin:8px 0 12px;"><i class="fas fa-arrow-down" style="color: var(--primary);"></i></div><div class="fs-group"><div class="fs-box"><div class="fs-title" style="font-weight:800; margin-bottom:12px;"><i class="fas fa-hand-holding-heart"></i> FS HARVESTING</div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Harvesting 1</div><div class="org-name">Ahmad Amirul bin Khalid</div></div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Harvesting 2</div><div class="org-name">Mohd Raof bin Mohd Ibrahim</div></div><div class="org-card"><div class="org-role">FS Harvesting 3</div><div class="org-name">Hafizul fikri</div></div></div><div class="fs-box"><div class="fs-title" style="font-weight:800; margin-bottom:12px;"><i class="fas fa-seedling"></i> FS UPKEEP</div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Upkeep 1</div><div class="org-name">Nik Azman Bin Nik Wan</div></div><div class="org-card" style="margin-bottom:8px;"><div class="org-role">FS Upkeep 2</div><div class="org-name">Muhammad Hairul Bin Jamaluddin</div></div><div class="org-card"><div class="org-role">FS Upkeep 3</div><div class="org-name">Muhammad Izzul Muhaimin bin Edy</div></div></div></div></div></div>
                <div class="card"><h3><i class="fas fa-chalkboard-user"></i> Kedudukan Tenaga Kerja</h3><div class="stats-row"><div class="stat-card"><div class="stat-number">7</div><div>👨‍🌾 MANDOR</div></div><div class="stat-card"><div class="stat-number">73</div><div>🌴 PENUAI</div></div><div class="stat-card"><div class="stat-number">7</div><div>🧪 PEMBAJAAN</div></div><div class="stat-card"><div class="stat-number">16</div><div>✂️ MERUMPUT</div></div></div></div>
            `
        },
        hasil: { title: "📈 Hasil Ladang", subtitle: "Data pengeluaran dan hasil sawit terkini", content: `<div class="card"><h3><i class="fas fa-chart-line"></i> Hasil Pengeluaran</h3><p>Data hasil ladang akan dipaparkan di sini. (Contoh: 245 tan FFB pada bulan ini)</p><div class="stat-card" style="margin-top:20px;"><div class="stat-number">245</div><div>Tan FFB</div></div></div>` },
        mekanisasi: { title: "🚜 Mekanisasi", subtitle: "Status jentera dan peralatan ladang", content: `<div class="card"><h3><i class="fas fa-tractor"></i> Status Jentera</h3><p>📊 Traktor beroperasi: 12 unit<br>🔧 Peralatan aktif: 85%</p></div>` },
        pembajaan: { title: "🧪 Pembajaan", subtitle: "Jadual dan rekod pembajaan", content: `<div class="card"><h3><i class="fas fa-seedling"></i> Program Pembajaan</h3><p>Bulan ini: Fasa 2 baja NPK hijau.<br>Kawasan diaplikasi: 320 hektar.</p></div>` },
        merumput: { title: "✂️ Merumput", subtitle: "Aktiviti kawalan rumpai", content: `<div class="card"><h3><i class="fas fa-cut"></i> Kawalan Rumpai</h3><p>Kemajuan merumput: 78% untuk bulan Mac.<br>Pasukan: 16 pekerja.</p></div>` },
        bap: { title: "🍃 BAP (Baja & Pemupukan)", subtitle: "Laporan BAP terkini", content: `<div class="card"><h3><i class="fas fa-leaf"></i> Laporan BAP</h3><p>Program BAP Fasa 1 selesai. Seterusnya Fasa 2 akan bermula minggu depan.</p></div>` }
    };

    // Fungsi untuk menukar halaman
    function loadPage(pageId) {
        const page = pagesData[pageId];
        if (!page) return;
        
        const container = document.getElementById('pageContent');
        container.innerHTML = `
            <div class="page-title">
                <h1>${page.title}</h1>
                <p>${page.subtitle}</p>
            </div>
            ${page.content}
        `;
        
        // Update active class pada navigation
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.classList.remove('active');
            if(link.getAttribute('data-page') === pageId) {
                link.classList.add('active');
            }
        });
        
        // Update URL tanpa reload dan tanpa '#' tambahan
        history.pushState({ page: pageId }, '', `?page=${pageId}`);
    }

    // Event listener untuk navigation links
    document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const pageId = link.getAttribute('data-page');
            if(pageId) {
                loadPage(pageId);
                // Auto hide sidebar selepas klik pada mobile (optional)
                if(window.innerWidth <= 768) {
                    sidebar.classList.add('collapsed');
                    mainContent.classList.add('expanded');
                    toggleBtn.classList.add('shifted');
                }
            }
        });
    });

    // Sidebar toggle functionality
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const toggleBtn = document.getElementById('toggleSidebarBtn');
    
    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('expanded');
        toggleBtn.classList.toggle('shifted');
    });

    // Handle back/forward browser buttons
    window.addEventListener('popstate', (event) => {
        const params = new URLSearchParams(window.location.search);
        const page = params.get('page');
        if(page && pagesData[page]) {
            loadPage(page);
        } else {
            loadPage('info');
        }
    });

    // Load initial page based on URL parameter atau default 'info'
    const urlParams = new URLSearchParams(window.location.search);
    const initialPage = urlParams.get('page');
    if(initialPage && pagesData[initialPage]) {
        loadPage(initialPage);
    } else {
        loadPage('info');
    }
</script>
</body>
</html>
