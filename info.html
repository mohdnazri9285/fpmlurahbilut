    hasil: { title:"📈 Laporan Hasil Ladang", subtitle:"Pencapaian mengikut Peringkat · Target vs Capai (hingga Mac 2026)", content:`

        <div class="card"><h3><i class="fas fa-table"></i> Ringkasan Pencapaian Mengikut Peringkat</h3><div style="overflow-x:auto;"><table class="summary-table" id="summaryTable"><thead><tr><th>Peringkat</th><th>Luas (Ha)</th><th>Target Tahunan (T/Ha)</th><th>Target hingga Mac (T/Ha)</th><th>Pencapaian Semasa (T/Ha)</th><th>% Capai Target</th></tr></thead><tbody id="summaryTableBody"></tbody></table></div></div>

function renderSummaryTable() {
    const tbody = document.getElementById('summaryTableBody');
    if(!tbody) return;
    tbody.innerHTML = '';
    peringkatList.forEach(p => {
        let percentCapai = ((p.currentTHa / p.targetToMac) * 100).toFixed(1);
        tbody.innerHTML += `<tr style="cursor:pointer" onclick="showDetailModal('${p.id}')"><td><strong>${p.name}</strong></td><td>${p.luas.toFixed(2)}</td><td>${p.targetYearTHa.toFixed(2)}</td><td>${p.targetToMac.toFixed(2)}</td><td>${p.currentTHa.toFixed(2)}</td><td style="color:${percentCapai >= 70 ? 'green' : (percentCapai >= 50 ? '#d4a13e' : 'red')}; font-weight:600;">${percentCapai}%</td></tr>`;
    });
}

function initChart() {
    const canvas = document.getElementById('hasilChart');
    if(!canvas) return;
    if(yieldChart) yieldChart.destroy();
    let labels = peringkatList.map(p => p.name);
    let currentData = peringkatList.map(p => p.currentTHa);
    let targetData = peringkatList.map(p => p.targetYearTHa);

    yieldChart = new Chart(canvas, {
        type: 'bar',
        data: { labels, datasets: [
            { label: 'Target Tahunan (T/Ha)', data: targetData, backgroundColor: '#e8f0e8', borderColor: '#d4a13e', borderWidth: 2, borderDash: [6,6], borderRadius: 8, barPercentage: 0.65,
              datalabels: { display: true, anchor: 'end', align: 'top', color: '#d4a13e', font: { size: 11, weight: 'bold' }, formatter: v => v.toFixed(1) + ' T/Ha' } },
            { label: 'Hasil Semasa (T/Ha) - Mac 2026', data: currentData, backgroundColor: '#2d6a4f', borderRadius: 8, barPercentage: 0.65,
              datalabels: { display: true, anchor: 'end', align: 'top', color: '#1b4d3e', font: { size: 12, weight: 'bold' }, formatter: v => v.toFixed(2) + ' T/Ha' } }
        ]},
        options: { responsive: true, maintainAspectRatio: true, layout: { padding: { top: 45 } },
            plugins: { tooltip: { mode: 'index', callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(2)} T/Ha` } },
                       legend: { position: 'top', labels: { font: { size: 12 } } },
                       datalabels: { display: true, anchor: 'end', align: 'top' } },
            scales: { y: { title: { display: true, text: 'Tan/Ha', font: { size: 13, weight: 'bold' } }, beginAtZero: true, max: Math.max(...targetData, ...currentData) * 1.15,
                          ticks: { callback: v => v.toFixed(1) + ' T/Ha' } },
                       x: { title: { display: true, text: 'Peringkat', font: { size: 13, weight: 'bold' } }, ticks: { maxRotation: 45, minRotation: 45, font: { size: 11 } } } },
            onClick: (e, active) => { if(active.length) showDetailModal(peringkatList[active[0].index].id); } }
    });
}

window.showDetailModal = function(id) {
    let p = peringkatList.find(x => x.id === id);
    if(!p) return;
    let months = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogo','Sep','Okt','Nov','Dis'];
    let tableRowsJanMar = '', total2025JanMar = 0, total2026JanMar = 0;

    for(let i=0;i<3;i++) {
        let v25 = p.monthlyTHa2025[i];
        let v26 = p.monthlyTHa2026[i];
        if(v25) total2025JanMar += v25;
        total2026JanMar += v26;
        let diff = (v25 && v25>0) ? ((v26 - v25)/v25*100).toFixed(1) : '-';
        tableRowsJanMar += `<tr><td><strong>${months[i]}</strong></td><td>${v25? v25.toFixed(2):'-'} T/Ha</td><td>${v26.toFixed(2)} T/Ha</td><td style="color:${diff!='-' && diff>=0?'green':'red'}">${diff}%</td></tr>`;
    }

    document.getElementById('modalTitle').innerHTML = `Peringkat ${p.name} - Analisis Terperinci`;
    document.getElementById('modalBody').innerHTML = `
        <div class="detail-stats"><div class="stat-box"><div class="stat-label">Luas (Ha)</div><div class="stat-value">${p.luas.toFixed(2)}</div></div><div class="stat-box"><div class="stat-label">Target Tahunan</div><div class="stat-value">${p.targetYearTHa.toFixed(2)} T/Ha</div></div><div class="stat-box"><div class="stat-label">Target hingga Mac</div><div class="stat-value">${p.targetToMac.toFixed(2)} T/Ha</div></div><div class="stat-box"><div class="stat-label">Capai hingga Mac</div><div class="stat-value">${p.currentTHa.toFixed(2)} T/Ha</div></div><div class="stat-box"><div class="stat-label">% Capai</div><div class="stat-value">${((p.currentTHa/p.targetToMac)*100).toFixed(1)}%</div></div></div>

        <h4>📈 Trend Tandan/Pokok/Bulan (Jan - Dis 2026)</h4>
        <div class="mini-chart"><canvas id="trendTandanChart" style="width:100%; height:280px;"></canvas></div>

        <h4>⚖️ Purata Berat Tandan (kg) - Bulanan (Jan - Dis 2026)</h4>
        <div class="mini-chart"><canvas id="trendBeratChart" style="width:100%; height:280px;"></canvas></div>

        <h4>📊 Perbandingan Hasil Bulanan (T/Ha) - 2025 vs 2026</h4>
        <div class="mini-chart"><canvas id="comparisonChart" style="width:100%; height:280px;"></canvas></div>

        <h4>📋 Jadual Perbandingan Jan - Mac 2026</h4>
        <div style="overflow-x:auto;">
            <table style="width:100%"><thead><tr><th>Bulan</th><th>2025</th><th>2026</th><th>Beza</th></tr></thead>
            <tbody>${tableRowsJanMar}</tbody>
            <tfoot><tr style="background:#f1f5f9; font-weight:600;"><td>JUMLAH (Jan-Mac)</td><td>${total2025JanMar.toFixed(2)} T/Ha</td><td>${total2026JanMar.toFixed(2)} T/Ha</td><td style="color:${((total2026JanMar-total2025JanMar)/total2025JanMar*100)>=0?'green':'red'}">${((total2026JanMar-total2025JanMar)/total2025JanMar*100).toFixed(1)}%</td></tr></tfoot>
            </table>
        </div>

        <div style="margin-top:20px; background:#f8f9fc; padding:15px; border-radius:14px;">
            <p>📌 Pencapaian ${((p.currentTHa/p.targetToMac)*100).toFixed(1)}% dari target hingga Mac (${p.targetToMac.toFixed(2)} T/Ha).</p>
            <p style="font-size:0.7rem; margin-top:8px;">*Data April hingga Disember 2026 akan dikemaskini selepas bulan berjalan.</p>
        </div>`;
    document.getElementById('detailModal').style.display = 'flex';

    setTimeout(() => {
        let ctxT = document.getElementById('trendTandanChart');
        let ctxB = document.getElementById('trendBeratChart');
        let ctxC = document.getElementById('comparisonChart');
        if(ctxT) new Chart(ctxT, { type:'line', data:{ labels:months, datasets:[{ label:'Tandan/Pokok/Bulan', data:p.tandanPerPkkData, borderColor:'#2d6a4f', backgroundColor:'rgba(45,106,79,0.1)', fill:true, tension:0.3, pointRadius:4, pointBackgroundColor:'#2d6a4f' }] }, options:{ responsive:true, maintainAspectRatio:true, plugins:{ tooltip:{ callbacks:{ label:(ctx)=>ctx.raw?`${ctx.raw.toFixed(2)} tandan/pokok`:'Tiada data' } }, datalabels: { display: true, anchor: 'end', align: 'top', color: '#2d6a4f', font: { size: 9, weight: 'bold' }, formatter: (v) => v && v>0 ? v.toFixed(2) : '' } }, scales:{ y:{ beginAtZero: true, title:{ display:true, text:'Tandan/Pokok' } } } } });
        if(ctxB) new Chart(ctxB, { type:'bar', data:{ labels:months, datasets:[{ label:'Purata Berat Tandan (kg)', data:p.beratTandanByMonth, backgroundColor:'#f4a261', borderRadius:8, datalabels:{ display: true, anchor: 'end', align: 'top', color: '#e76f51', font:{ size:9, weight:'bold' }, formatter:(v)=>v && v>0?`${v.toFixed(1)} kg`:'' } }] }, options:{ responsive:true, maintainAspectRatio:true, scales:{ y:{ beginAtZero:true, title:{ display:true, text:'Berat (kg)' } } } } });
        if(ctxC) new Chart(ctxC, { type:'bar', data:{ labels:months, datasets:[{ label:'2025', data:p.monthlyTHa2025, backgroundColor:'#9aa9b9', borderRadius:8, datalabels:{ display: true, anchor: 'end', align: 'top', color: '#5a6874', font:{ size:9 }, formatter:(v)=>v && v>0?`${v.toFixed(2)}`:'0' } },{ label:'2026', data:p.monthlyTHa2026, backgroundColor:'#2d6a4f', borderRadius:8, datalabels:{ display: true, anchor: 'end', align: 'top', color: '#1b4d3e', font:{ size:9, weight:'bold' }, formatter:(v)=>v>0?`${v.toFixed(2)}`:'0' } }] }, options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ position:'top' } }, scales:{ y:{ beginAtZero:true, title:{ display:true, text:'Tan/Ha' } } } } });
    }, 100);
};

function loadPage(pageId) {
    let page = pagesData[pageId];
    if(!page) return;
    document.getElementById('pageContent').innerHTML = `<div class="page-title"><h1>${page.title}</h1><p>${page.subtitle}</p></div>${page.content}`;
    document.querySelectorAll('.nav-links a').forEach(link => { link.classList.remove('active'); if(link.getAttribute('data-page') === pageId) link.classList.add('active'); });
    history.pushState({ page: pageId }, '', `?page=${pageId}`);
    if(pageId === 'hasil') { renderSummaryTable(); setTimeout(() => initChart(), 50); }

    if(window.innerWidth <= 768) {
        sidebar.classList.remove('collapsed');
        mainContent.classList.remove('expanded');
        toggleBtn.classList.remove('shifted');
    }
}

// Sidebar Toggle
const sidebar = document.getElementById('sidebar');
const mainContent = document.getElementById('mainContent');
const toggleBtn = document.getElementById('toggleSidebarBtn');
sidebar.classList.remove('collapsed');
mainContent.classList.remove('expanded');
toggleBtn.classList.remove('shifted');
toggleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('collapsed');
    mainContent.classList.toggle('expanded');
    toggleBtn.classList.toggle('shifted');
});

// Navigation
document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', (e) => { e.preventDefault(); loadPage(link.getAttribute('data-page')); });
});

// Modal close
document.getElementById('closeModalBtn').onclick = () => document.getElementById('detailModal').style.display = 'none';
window.onclick = (e) => { if(e.target === document.getElementById('detailModal')) document.getElementById('detailModal').style.display = 'none'; };
window.addEventListener('popstate', () => { let params = new URLSearchParams(window.location.search); loadPage(params.get('page') || 'info'); });

// ========== PWA INSTALL (SAMA SEPERTI WEBSITE RUJUKAN) ==========
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'flex';
});
document.getElementById('installBtn').addEventListener('click', () => {
    if(deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
            document.getElementById('installBtn').style.display = 'none';
        });
    }
});

let urlParams = new URLSearchParams(window.location.search);
loadPage(urlParams.get('page') || 'info');
</script>
